name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - run: uv sync
      - name: Run unit tests
        run: uv run pytest tests/unit tests/fault -q --no-header --tb=short

  tenant-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.12'
      - run: uv sync
      - name: Run tenant isolation tests
        run: uv run pytest tests/integration/test_tenant_isolation.py -q --no-header
